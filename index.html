<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS · AI 创作实验室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 动态背景 -->
    <div class="background-container">
        <canvas id="particleCanvas"></canvas>
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- 设置按钮 -->
    <button id="settingsBtn" class="settings-btn" aria-label="打开设置">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <!-- 侧边栏 -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-header">
                <h2>配置中心</h2>
                <button id="closeSidebar" class="close-btn" aria-label="关闭侧边栏">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- 图片 API 配置 -->
            <div class="config-section">
                <h3 class="section-title">
                    <span class="icon">📷</span>
                    图片生成 API
                </h3>
                <div class="input-group">
                    <label>API 端点</label>
                    <input type="text" id="imageApiEndpoint" placeholder="https://api.openai.com/v1/images/generations">
                </div>
                <div class="input-group">
                    <label>API 密钥</label>
                    <input type="password" id="imageApiKey" placeholder="sk-...">
                </div>
            </div>

            <!-- 视频 API 配置 -->
            <div class="config-section">
                <h3 class="section-title">
                    <span class="icon">🎬</span>
                    视频生成 API
                </h3>
                <div class="input-group">
                    <label>API 端点</label>
                    <input type="text" id="videoApiEndpoint" placeholder="https://api.runwayml.com/v1/generate">
                </div>
                <div class="input-group">
                    <label>API 密钥</label>
                    <input type="password" id="videoApiKey" placeholder="your-api-key">
                </div>
            </div>

            <!-- 高级设置 -->
            <div class="config-section">
                <h3 class="section-title">
                    <span class="icon">⚙️</span>
                    高级设置
                </h3>
                <div class="input-group">
                    <label>请求超时（秒）</label>
                    <div class="number-input-wrapper">
                        <input type="number" id="apiTimeout" value="60" min="1" max="600">
                        <div class="number-controls">
                            <button type="button" class="increment" aria-label="增加">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="18 15 12 9 6 15"></polyline>
                                </svg>
                            </button>
                            <button type="button" class="decrement" aria-label="减少">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <button id="saveSettings" class="btn-primary">保存配置</button>
            <button id="clearCache" class="btn-danger">清空缓存</button>

            <div class="info-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <span>配置将保存在浏览器本地存储中</span>
            </div>
        </div>
    </aside>

    <!-- 遮罩层 -->
    <div id="overlay" class="overlay"></div>

    <!-- 主容器 -->
    <main class="main-container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo-section">
                <h1 class="logo">GENESIS</h1>
                <div class="logo-line"></div>
            </div>
            <p class="tagline">AI 驱动的视觉创作实验室</p>
        </header>

        <!-- 标签切换 -->
        <nav class="tab-nav">
            <button id="imageTab" class="tab-btn active" data-tab="image">
                <span class="tab-icon">📷</span>
                <span class="tab-text">图片生成</span>
                <span class="tab-indicator"></span>
            </button>
            <button id="videoTab" class="tab-btn" data-tab="video">
                <span class="tab-icon">🎬</span>
                <span class="tab-text">视频生成</span>
                <span class="tab-indicator"></span>
            </button>
        </nav>

        <!-- 图片生成面板 -->
        <section id="imagePanel" class="panel active">
            <div class="panel-card">
                <div class="card-header">
                    <h2>图片创作</h2>
                    <div class="header-decoration"></div>
                </div>

                <div class="form-container">
                    <!-- 提示词输入 -->
                    <div class="input-wrapper">
                        <label class="input-label">描述你的创意</label>
                        <textarea id="imagePrompt" rows="4" placeholder="例如：一只优雅的黑猫坐在霓虹灯闪烁的东京街头，赛博朋克风格，电影级光影"></textarea>
                        <div class="input-glow"></div>
                    </div>

                    <!-- 尺寸选择器 -->
                    <div class="size-selector-wrapper">
                        <label class="input-label">选择尺寸</label>
                        <div class="size-categories">
                            <button class="category-tab active" data-category="desktop">💻 电脑</button>
                            <button class="category-tab" data-category="mobile">📱 手机</button>
                            <button class="category-tab" data-category="social">🌐 社交</button>
                            <button class="category-tab" data-category="square">⬜ 方形</button>
                        </div>
                        <div class="size-grid" id="sizeGrid"></div>
                        <input type="hidden" id="imageSize" value="1920x1080">
                    </div>

                    <!-- 参数设置 -->
                    <div class="params-grid">
                        <div class="param-item">
                            <label>数量</label>
                            <select id="imageCount">
                                <option value="1">1 张</option>
                                <option value="2">2 张</option>
                                <option value="4">4 张</option>
                            </select>
                        </div>
                        <div class="param-item">
                            <label>风格</label>
                            <select id="imageStyle">
                                <option value="-">-</option>
                                <option value="vivid">生动</option>
                                <option value="natural">自然</option>
                            </select>
                        </div>
                    </div>

                    <!-- 生成按钮 -->
                    <button id="generateImage" class="generate-btn">
                        <span class="btn-text">开始创作</span>
                        <span class="btn-glow"></span>
                    </button>
                </div>

                <!-- 加载状态 -->
                <div id="imageLoading" class="loading-state">
                    <div class="loading-spinner">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">正在生成图片...</p>
                </div>

                <!-- 图片结果展示 -->
                <div id="imageResults" class="results-container">
                    <h3 class="results-title">生成结果</h3>
                    <div id="imageGrid" class="image-grid"></div>
                </div>
            </div>
        </section>

        <!-- 视频生成面板 -->
        <section id="videoPanel" class="panel">
            <div class="panel-card">
                <div class="card-header">
                    <h2>视频创作</h2>
                    <div class="header-decoration"></div>
                </div>

                <div class="form-container">
                    <!-- 提示词输入 -->
                    <div class="input-wrapper">
                        <label class="input-label">描述你的创意</label>
                        <textarea id="videoPrompt" rows="4" placeholder="例如：海浪轻柔地拍打着金色沙滩，夕阳将天空染成橙红色，海鸥在远处飞翔"></textarea>
                        <div class="input-glow"></div>
                    </div>

                    <!-- 首帧 / 尾帧（可选） -->
                    <div class="frame-inputs">
                        <div class="frame-item">
                            <label class="input-label">首帧图片 <span class="optional-tag">可选</span></label>
                            <div class="frame-drop-zone" id="firstFrameZone">
                                <input type="file" id="firstFrameFile" accept="image/*" class="frame-file-input">
                                <div class="frame-placeholder" id="firstFramePlaceholder">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                    <span>拖拽或点击上传首帧</span>
                                    <span class="frame-hint">设置视频的起始画面</span>
                                </div>
                                <div class="frame-preview" id="firstFramePreview">
                                    <img id="firstFrameImg" src="" alt="首帧预览">
                                    <button type="button" class="frame-remove-btn" id="removeFirstFrame" aria-label="移除首帧">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="frame-item">
                            <label class="input-label">尾帧图片 <span class="optional-tag">可选</span></label>
                            <div class="frame-drop-zone" id="lastFrameZone">
                                <input type="file" id="lastFrameFile" accept="image/*" class="frame-file-input">
                                <div class="frame-placeholder" id="lastFramePlaceholder">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                        <polyline points="21 15 16 10 5 21"></polyline>
                                    </svg>
                                    <span>拖拽或点击上传尾帧</span>
                                    <span class="frame-hint">设置视频的结束画面</span>
                                </div>
                                <div class="frame-preview" id="lastFramePreview">
                                    <img id="lastFrameImg" src="" alt="尾帧预览">
                                    <button type="button" class="frame-remove-btn" id="removeLastFrame" aria-label="移除尾帧">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="18" y1="6" x2="6" y2="18"></line>
                                            <line x1="6" y1="6" x2="18" y2="18"></line>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 参数设置 -->
                    <div class="params-grid">
                        <div class="param-item">
                            <label>时长</label>
                            <select id="videoDuration">
                                <option value="5">5 秒</option>
                                <option value="10">10 秒</option>
                                <option value="15">15 秒</option>
                            </select>
                        </div>
                        <div class="param-item">
                            <label>分辨率</label>
                            <select id="videoResolution">
                                <option value="720p">720p</option>
                                <option value="1080p">1080p</option>
                            </select>
                        </div>
                    </div>

                    <!-- 生成按钮 -->
                    <button id="generateVideo" class="generate-btn">
                        <span class="btn-text">开始创作</span>
                        <span class="btn-glow"></span>
                    </button>
                </div>

                <!-- 加载状态 -->
                <div id="videoLoading" class="loading-state">
                    <div class="loading-spinner">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <p class="loading-text">正在生成视频，请稍候...</p>
                </div>

                <!-- 视频结果展示 -->
                <div id="videoResults" class="results-container">
                    <h3 class="results-title">生成结果</h3>
                    <div id="videoContainer" class="video-container"></div>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
